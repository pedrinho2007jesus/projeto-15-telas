<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>

  <link rel="stylesheet" href="suasPostagem.css">
</head>
<body>

  <!-- TOPO -->
  <header class="topo">

    <div class="logo-menu">
      <h2>HABIT</h2>

      <nav>
        <a href="#">Início</a>
        <a href="#">Páginas</a>
        <a href="#">Destaques</a>
        <a href="#">Assinar</a>
        <a href="#">Admin</a>
      </nav>
    </div>

    <div class="acoes">
      <input type="text" placeholder="Buscar...">

      <button>Buscar</button>
      <button>Entrar</button>
    </div>

  </header>

  <!-- CONTEÚDO -->
  <main class="container">

    <!-- PERFIL -->
    <section class="perfil-box">

      <h2>Perfil</h2>

      <div class="foto"></div>

      <input type="text" placeholder="Nome">

      <input type="text" placeholder="Bio">

      <button class="salvar">Salvar</button>

    </section>

    <!-- POSTAGENS -->
    <section class="postagens">

      <h2>Suas Postagens</h2>

      <div class="post">
        <div class="thumb"></div>

        <div class="info">
          <p>Rascunho</p>
          <h3>Post 1</h3>
        </div>
      </div>

      <div class="post">
        <div class="thumb"></div>

        <div class="info">
          <p>Publicado</p>
          <h3>Post 2</h3>
        </div>
      </div>

      <div class="post">
        <div class="thumb"></div>

        <div class="info">
          <p>Em análise</p>
          <h3>Comentário 1</h3>
        </div>
      </div>

      <div class="post">
        <div class="thumb"></div>

        <div class="info">
          <p>Publicado</p>
          <h3>Comentário 2</h3>
        </div>
      </div>

    </section>

  </main>

  <!-- RODAPÉ -->
  <footer>

    <div class="footer-card">Instagram</div>
    <div class="footer-card">Work</div>
    <div class="footer-card">Bags</div>
    <div class="footer-card">Lamp</div>
    <div class="footer-card">Books</div>

  </footer>

  <p class="copy">© 2025 Meu Site • Meu site</p>

</body>
</html>
