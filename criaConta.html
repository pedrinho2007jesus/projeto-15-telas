<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta</title>
  <link rel="stylesheet" href="criaConta.css">
</head>
<body>

<header class="topo">
  <div class="logo-menu">
    <h2>HABIT</h2>

    <nav>
      <a href="#">Início</a>
      <a href="#">Páginas</a>
      <a href="#">Destaques</a>
      <a href="#">Assinar</a>
      <a href="#">Admin</a>
    </nav>
  </div>

  <div class="acoes">
    <input type="text" placeholder="Buscar...">
    <button>Buscar</button>
    <button>Entrar</button>
  </div>
</header>

<main class="container">

  <section class="cadastro-box">
    <h1>Criar Conta</h1>

    <input type="text" placeholder="Nome completo">
    <input type="email" placeholder="E-mail">
    <input type="password" placeholder="Senha">
    <input type="password" placeholder="Confirmar senha">

    <label class="termos">
      <input type="checkbox">
      Concordo com os termos e a política de privacidade
    </label>

    <button class="cadastrar">Cadastrar</button>
  </section>

</main>

<footer>
  <div class="footer-card">Instagram</div>
  <div class="footer-card">Work</div>
  <div class="footer-card">Bags</div>
  <div class="footer-card">Lamp</div>
  <div class="footer-card">Books</div>
</footer>

<p class="copy">© 2025 Meu Site • Meu site</p>

</body>
</html>
