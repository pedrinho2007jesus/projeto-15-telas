<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Habit</title>

    <link rel="stylesheet" href="post.css">
</head>
<body>

    <header class="topo">
        <div class="logo-menu">
            <h2>HABIT</h2>

            <nav>
                <a href="#">Início</a>
                <a href="#">Páginas</a>
                <a href="#">Destaques</a>
                <a href="#">Assinar</a>
                <a href="#">Admin</a>
            </nav>
        </div>

        <div class="acoes">
            <input type="text" placeholder="Buscar...">

            <button class="btn-outline">Buscar</button>
            <button class="btn-outline">Entrar</button>
        </div>
    </header>

    <main class="container">

        <aside class="menu-lateral">
            <h3>Menu</h3>

            <ul>
                <li>Categorias</li>
                <li>Criar Post</li>
                <li>Escolhas do Editor</li>
                <li>Usuários</li>
                <li>Fila de revisão</li>
                <li>Fila de comentários</li>
            </ul>
        </aside>

        <section class="conteudo">

            <div class="cards">
                <div class="card">
                    <p>Posts</p>
                    <h2>128</h2>
                </div>

                <div class="card">
                    <p>Visualizações</p>
                    <h2>54k</h2>
                </div>

                <div class="card">
                    <p>Inscritos</p>
                    <h2>12k</h2>
                </div>

                <div class="card">
                    <p>Pendências</p>
                    <h2>7</h2>
                </div>
            </div>

            <div class="post-box">
                <h2>Criar Post</h2>

                <div class="formulario">

                    <input type="text" placeholder="Título">

                    <textarea placeholder="Escreva aqui... (Editor simulador)"></textarea>

                    <div class="linha-inputs">
                        <input type="text" placeholder="Categorias e tags">

                        <input type="text" placeholder="Upload da imagem de capa">
                    </div>

                    <div class="botoes">
                        <button class="btn-outline">Salvar rascunho</button>

                        <button class="btn-outline">Enviar para revisão</button>

                        <button class="btn-fill">Publicar (admin)</button>
                    </div>

                </div>
            </div>

        </section>

    </main>

    <footer class="rodape">

        <div class="footer-cards">
            <div class="footer-card">Instagram</div>
            <div class="footer-card">Work</div>
            <div class="footer-card">Bags</div>
            <div class="footer-card">Lamp</div>
            <div class="footer-card">Books</div>
        </div>

        <p>© 2025 Meu Site • Meu site</p>

    </footer>

</body>
</html>
